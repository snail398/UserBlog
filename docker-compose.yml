services:
  postgres:
    image: postgres:16
    container_name: user_blog_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - user_blog_postgres_data:/var/lib/postgresql/data

volumes:
  user_blog_postgres_data: